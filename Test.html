<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba GET Productos</title>
</head>
<body>
  <h2>Obtener Productos</h2>
  <button onclick="obtenerProductos()">Cargar Productos</button>

  <script>
    function obtenerProductos() {
      fetch("https://script.google.com/macros/s/AKfycbzCBFnL-RvYwtDWeIF6jSgMYdS3uiUfnue.../exec?action=getProducts", {
        method: "GET"
      })
      .then(res => {
        if (!res.ok) throw new Error("Respuesta HTTP no OK: " + res.status);
        return res.json();
      })
      .then(data => {
        console.log("✅ Productos recibidos:", data);
        alert("Se recibieron " + data.length + " productos");
      })
      .catch(err => {
        console.error("❌ Error al obtener productos:", err);
        alert("Error: " + err.message);
      });
    }
  </script>
</body>
</html>
