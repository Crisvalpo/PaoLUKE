<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba POST Pedido</title>
</head>
<body>
  <h2>Prueba de envío de pedido</h2>
  <button onclick="enviarPedido()">Enviar Pedido</button>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzCBFnL-RvYwtDWeIF6jSgMYdS3uiUfnue.../exec";

    function enviarPedido() {
      fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "processOrder",
          datosCliente: {
            nombre: "Prueba",
            email: "prueba@ejemplo.com",
            telefono: "123456789",
            direccion: "Concón",
            notas: "Pedido de prueba mínimo"
          },
          carrito: [
            { nombre: "Item de prueba", cantidad: 1, precio: 1000, subtotal: 1000 }
          ],
          total: 1000
        })
      })
      .then(res => {
        if (!res.ok) throw new Error("Respuesta HTTP no OK: " + res.status);
        return res.json();
      })
      .then(data => {
        console.log("✅ Pedido procesado:", data);
        alert("Respuesta: " + data.mensaje);
      })
      .catch(err => {
        console.error("❌ Error al enviar pedido:", err);
        alert("Error: " + err.message);
      });
    }
  </script>
</body>
</html>
